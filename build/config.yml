# VisuTask Build Configuration
version: '3'

info:
  companyName: "VisuTask"
  productName: "VisuTask"
  productIdentifier: "com.visutask.app"
  description: "GUI Automation Desktop App"
  copyright: "(c) 2025, VisuTask"
  comments: "GUI Automation Desktop App"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: info
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/node_modules
      - frontend/dist
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - pnpm-lock.yaml
    watched_extension:
      - "*.go"
      - "*.tsx"
      - "*.ts"
      - "*.css"
      - "*.json"
    git_ignore: true
  executes:
    # Step 1: Kill any leftover Vite processes
    - cmd: pkill -f "vite.*9245" || true
      type: once
    # Step 2: Install deps (once)
    - cmd: cd frontend && pnpm install
      type: once
    # Step 3: Build frontend (needed for Go embed fallback)
    - cmd: cd frontend && pnpm build
      type: blocking
    # Step 4: Start Vite dev server in background (waits for it to be ready)
    - cmd: cd frontend && pnpm dev --port 9245 --host 127.0.0.1
      type: background
    # Step 5: Build Go binary
    - cmd: go build -o bin/visutask .
      type: blocking
    # Step 6: Wait for Vite to be ready, then launch app
    - cmd: |
        for i in $(seq 1 30); do
          curl -s http://127.0.0.1:9245 > /dev/null 2>&1 && break
          sleep 0.5
        done
        mkdir -p bin/visutask.dev.app/Contents/{MacOS,Resources}
        cp build/darwin/icons.icns bin/visutask.dev.app/Contents/Resources/
        cp bin/visutask bin/visutask.dev.app/Contents/MacOS/
        cp build/darwin/Info.dev.plist bin/visutask.dev.app/Contents/Info.plist
        codesign --force --deep --sign - bin/visutask.dev.app
        bin/visutask.dev.app/Contents/MacOS/visutask
      type: primary
